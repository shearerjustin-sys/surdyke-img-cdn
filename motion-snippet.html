<style id="sykmo-css">
[id$="-hd"] .syh-bar{transition:box-shadow .35s ease,background .35s ease,backdrop-filter .35s ease}
[id$="-hd"] .syh-bar.sykmo-scrolled{box-shadow:0 8px 34px rgba(8,10,14,.10);background:rgba(255,255,255,.82);backdrop-filter:saturate(170%) blur(16px);-webkit-backdrop-filter:saturate(170%) blur(16px)}
[id$="-lp"] .galgrid .g,[id$="-lp"] .syg-grid figure,[id$="-lp"] .scbx-grid figure{transition:transform .9s cubic-bezier(.16,1,.3,1);will-change:transform}
[id$="-lp"] .galgrid .g:hover,[id$="-lp"] .syg-grid figure:hover,[id$="-lp"] .scbx-grid figure:hover{transform:scale(1.045)}
[id$="-lp"] .hero a[class*="btn"]{transition:transform .3s cubic-bezier(.22,1,.36,1),background .2s,box-shadow .3s}
@media (prefers-reduced-motion:no-preference){
 .sykmo-kb{animation:sykmoKB 24s ease-in-out infinite alternate!important}
 @keyframes sykmoKB{from{transform:scale(1.06)}to{transform:scale(1.17) translateY(-2%)}}
 .sykmo-rv{opacity:0;transform:translateY(38px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1)}
 .sykmo-rv.sykmo-in{opacity:1;transform:none}
 .sykmo-w{display:inline-block;overflow:hidden;vertical-align:top;line-height:inherit}
 .sykmo-w i{display:inline-block;font-style:normal;transform:translateY(120%);transition:transform 1.05s cubic-bezier(.16,1,.3,1)}
 .sykmo-h.sykmo-in .sykmo-w i{transform:none}
 .sykmo-up{opacity:0;transform:translateY(22px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1)}
 .sykmo-up.sykmo-in{opacity:1;transform:none}
}
</style>
<script>/*sykmo-motion*/
(function(){
 var lp=document.querySelector('[id$="-lp"]');if(!lp)return;
 var RM=matchMedia('(prefers-reduced-motion:reduce)').matches;
 var bar=document.querySelector('[id$="-hd"] .syh-bar');
 if(bar){var f=function(){bar.classList.toggle('sykmo-scrolled',(window.scrollY||0)>40);};addEventListener('scroll',f,{passive:true});f();}
 if(RM)return;
 var hero=lp.querySelector('[class*="hero"]');
 if(hero){
  var bg=null;[].slice.call(hero.querySelectorAll('*')).some(function(el){var bi=getComputedStyle(el).backgroundImage;if(bi&&bi!=='none'&&bi.indexOf('url')>-1&&el.offsetHeight>200){bg=el;return true;}return false;});
  if(bg)bg.classList.add('sykmo-kb');
  var h1=hero.querySelector('h1');
  if(h1&&!h1.querySelector('.sykmo-w')){
   var html='';[].slice.call(h1.childNodes).forEach(function(n){
    if(n.nodeType===3){n.textContent.split(/(\s+)/).forEach(function(w){html+=/\S/.test(w)?'<span class="sykmo-w"><i>'+w.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</i></span>':w;});}
    else if(n.nodeName==='BR')html+='<br>';
    else if(n.outerHTML)html+=n.outerHTML;
   });
   h1.innerHTML=html;h1.classList.add('sykmo-h');
   [].slice.call(h1.querySelectorAll('.sykmo-w i')).forEach(function(it,i){it.style.transitionDelay=(120+i*80)+'ms';});
   requestAnimationFrame(function(){requestAnimationFrame(function(){h1.classList.add('sykmo-in');});});
  }
  if(h1&&h1.parentElement){
   var kids=[].slice.call(h1.parentElement.children),d=160;
   kids.forEach(function(el){if(el===h1||/^H[1-6]$/.test(el.tagName))return;el.classList.add('sykmo-up');el.style.transitionDelay=d+'ms';d+=140;});
   requestAnimationFrame(function(){requestAnimationFrame(function(){kids.forEach(function(el){if(el.classList.contains('sykmo-up'))el.classList.add('sykmo-in');});});});
  }
 }
 var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('sykmo-in');io.unobserve(e.target);}});},{threshold:.12,rootMargin:'0px 0px -8% 0px'});
 var sel='.intro .in,.band .copy,.canvas .copy,.canvas .shot,.head,.series-h,.mcard,.galgrid .g,.scbx-grid figure,.syg-grid figure,.syw .card,.lead .lcard,.buildcta .in';
 [].slice.call(lp.querySelectorAll(sel)).forEach(function(el,i){if(el.closest('[class*="hero"]'))return;el.classList.add('sykmo-rv');el.style.transitionDelay=((i%6)*75)+'ms';io.observe(el);});
 function cu(b){var t=b.textContent,m=t.match(/([\d,]+)/);if(!m)return;var target=parseInt(m[1].replace(/,/g,''),10);if(!target||target>1000000)return;var pre=t.slice(0,m.index),suf=t.slice(m.index+m[1].length),dur=1100,t0=null;function s(ts){if(!t0)t0=ts;var p=Math.min((ts-t0)/dur,1),e=1-Math.pow(1-p,3);b.textContent=pre+Math.round(target*e).toLocaleString()+suf;if(p<1)requestAnimationFrame(s);}requestAnimationFrame(s);}
 var cio=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){cu(e.target);cio.unobserve(e.target);}});},{threshold:.6});
 [].slice.call(lp.querySelectorAll('.intro .st b,.intro .stats b')).forEach(function(b){if(/\d/.test(b.textContent))cio.observe(b);});
 if(matchMedia('(pointer:fine)').matches){
  [].slice.call(lp.querySelectorAll('.hero a[class*="btn"]')).forEach(function(el){
   el.addEventListener('mousemove',function(e){var r=el.getBoundingClientRect();el.style.transform='translate('+((e.clientX-r.left-r.width/2)*.25)+'px,'+((e.clientY-r.top-r.height/2)*.35)+'px)';});
   el.addEventListener('mouseleave',function(){el.style.transform='';});
  });
 }
})();
</script>
